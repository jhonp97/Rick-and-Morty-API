name: CI Quality Gates

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Instalar dependencias del root
        run: npm ci

      - name: Instalar dependencias del frontend
        run: npm ci
        working-directory: rickAndMorty-React

      - name: Instalar dependencias del backend
        run: npm ci
        working-directory: backend-rickandmorty

      - name: Lint frontend
        run: npm run lint
        working-directory: rickAndMorty-React

      - name: Tests backend
        run: npm test
        working-directory: backend-rickandmorty

      - name: Tests frontend
        run: npm test
        working-directory: rickAndMorty-React

      - name: Build frontend
        run: npm run build
        working-directory: rickAndMorty-React

      - name: Verificar build
        run: |
          if [ -d "rickAndMorty-React/dist" ]; then
            echo "✅ Build exitoso - directorio dist creado"
            ls -la rickAndMorty-React/dist
          else
            echo "❌ Build falló - directorio dist no existe"
            exit 1
          fi
