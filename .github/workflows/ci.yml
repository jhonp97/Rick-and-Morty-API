name: CI Quality Gates

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Instalar dependencias del root
        run: npm ci

      - name: Instalar dependencias del frontend
        run: npm ci
        working-directory: rickAndMorty-React

      - name: Instalar dependencias del backend
        run: npm ci
        working-directory: backend-rickandmorty

      - name: Lint frontend
        run: npm run lint
        working-directory: rickAndMorty-React

      - name: Tests backend
        run: npm test
        working-directory: backend-rickandmorty

      - name: Tests frontend
        run: npm test
        working-directory: rickAndMorty-React

      - name: Build frontend
        run: npm run build
        working-directory: rickAndMorty-React

      - name: Verificar build
        run: |
          if [ -d "rickAndMorty-React/dist" ]; then
            echo "✅ Build exitoso - directorio dist creado"
            ls -la rickAndMorty-React/dist
          else
            echo "❌ Build falló - directorio dist no existe"
            exit 1
          fi

      - name: Security audit - Frontend
        run: npm audit --audit-level=high
        working-directory: rickAndMorty-React
        continue-on-error: true

      - name: Security audit - Backend
        run: npm audit --audit-level=high
        working-directory: backend-rickandmorty
        continue-on-error: true

      - name: Resumen de seguridad
        run: |
          echo "🔒 Auditoría de seguridad completada"
          echo "Frontend:"
          cd rickAndMorty-React && npm audit --audit-level=high 2>&1 | tail -5 || true
          echo ""
          echo "Backend:"
          cd ../backend-rickandmorty && npm audit --audit-level=high 2>&1 | tail -5 || true
