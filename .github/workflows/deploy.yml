name: Deploy to Vercel

on:
  workflow_run:
    workflows: ["CI Quality Gates"]
    types:
      - completed

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm ci
        working-directory: rickAndMorty-React

      - name: Build para producción
        run: npm run build
        working-directory: rickAndMorty-React
        env:
          VITE_API_URL: https://rickandmortyapi.com/api

      - name: Verificar build
        run: |
          if [ -d "rickAndMorty-React/dist" ]; then
            echo "✅ Build exitoso"
            ls -la rickAndMorty-React/dist
          else
            echo "❌ Build falló"
            exit 1
          fi

      - name: Deploy a Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: rickAndMorty-React
